<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaito OS - Workspace</title>
    
    <link rel="stylesheet" href="./Css/style.css">
    <link rel="stylesheet" href="./Css/windows.css">

    <style>
        /* Reseteo universal y preparación para Kaito OS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Evita que el texto se seleccione por accidente al arrastrar ventanas */
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #050508;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
        }

        /* Contenedor principal del escritorio */
        #desktop-environment {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-image: var(--desktop-bg, none);
            background-size: cover;
            background-position: center;
        }

        /* Área donde vivirán las ventanas de las apps */
        #window-container {
            flex-grow: 1;
            position: relative;
            z-index: 10;
        }

        /* Isla Dinámica Superior */
        #dynamic-island-container {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 35px;
            background: #000;
            border-radius: 20px;
            z-index: 9999;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Centro de Control y Notificaciones */
        #control-center-overlay, #notifications-overlay {
            position: absolute;
            top: 50px;
            background: rgba(25, 25, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 9000;
            display: none;
        }

        #control-center-overlay { right: 20px; width: 300px; height: 400px; }
        #notifications-overlay { right: 330px; width: 280px; height: auto; min-height: 100px; }

        /* Spotlight (Buscador) */
        #spotlight-search {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            max-width: 600px;
            background: rgba(30, 30, 35, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 15px;
            z-index: 9500;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Estructura del Dock inferior */
        #dock-container {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            gap: 12px;
            z-index: 5000;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dock-app-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .dock-app-icon:hover {
            transform: scale(1.15) translateY(-5px);
        }
        
        .dock-app-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }
    </style>
</head>
<body>

    <div id="desktop-environment">
        
        <div id="dynamic-island-container">
            <span id="dynamic-island-content" style="font-size: 12px;">Kaito OS</span>
        </div>

        <div id="window-container">
            </div>

        <div id="spotlight-search">
            <input type="text" id="spotlight-input" placeholder="Buscar en Kaito OS..." style="width: 100%; background: transparent; border: none; color: white; font-size: 18px; outline: none;">
        </div>

        <div id="control-center-overlay">
            </div>

        <div id="notifications-overlay">
            </div>

        <div id="dock-container">
            
            <div class="dock-app-icon" id="dock-app-finder" data-app="finder" title="Archivos">
                <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
            </div>

            <div class="dock-app-icon" id="dock-app-browser" data-app="browser" title="Navegador">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            </div>

            <div class="dock-app-icon" id="dock-app-chat" data-app="chat" title="Mensajes">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
            </div>

            <div class="dock-app-icon" id="dock-app-chromo" data-app="chromo" title="Chromo">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
            </div>

            <div class="dock-app-icon" id="dock-app-notes" data-app="notes" title="Notas">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            </div>

            <div class="dock-app-icon" id="dock-app-terminal" data-app="terminal" title="Terminal">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.89-2-2-2zm0 14H4V8h16v10zm-2-1h-6v-2h6v2zM7.5 17l-1.41-1.41L8.67 12l-2.58-3.59L7.5 7l4 5-4 5z"/></svg>
            </div>

            <div class="dock-app-icon" id="dock-app-calculator" data-app="calculator" title="Calculadora">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-6 16H7v-2h6v2zm4-4H7v-2h10v2zm0-4H7v-2h10v2zm0-4H7V5h10v2z"/></svg>
            </div>

            <div class="dock-app-icon" id="dock-app-clock" data-app="clock" title="Reloj">
                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            </div>

            <div class="dock-app-icon" id="dock-app-gallery" data-app="gallery" title="Galería">
                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            </div>

            <div class="dock-app-icon" id="dock-app-settings" data-app="settings" title="Ajustes">
                <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 C9.64,21.83,9.83,22,10.07,22h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </div>

            <div class="dock-app-icon" id="dock-app-store" data-app="store" title="Tienda">
                <svg viewBox="0 0 24 24"><path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/></svg>
            </div>

        </div>
    </div>

    <script src="./js/supabase-config.js"></script>
    <script src="./js/filesystem.js"></script>

    <script src="./js/window-manager.js"></script>
    <script src="./js/notifications.js"></script>
    <script src="./js/dock.js"></script>
    <script src="./js/spotlight.js"></script>
    <script src="./js/dynamic-island.js"></script>
    <script src="./js/control-center.js"></script>

    <script src="./js/apps/browser.js"></script>
    <script src="./js/apps/calculator.js"></script>
    <script src="./js/apps/chat.js"></script>
    <script src="./js/apps/chromo.js"></script>
    <script src="./js/apps/clock.js"></script>
    <script src="./js/apps/finder.js"></script>
    <script src="./js/apps/gallery.js"></script>
    <script src="./js/apps/notes.js"></script>
    <script src="./js/apps/settings.js"></script>
    <script src="./js/apps/store.js"></script>
    <script src="./js/apps/terminal.js"></script>

    <script src="./js/main.js"></script>

</body>
</html>
